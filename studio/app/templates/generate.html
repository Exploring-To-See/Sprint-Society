{% extends "base.html" %}
{% block title %}Generate — Kendu Studio{% endblock %}

{% block content %}
<div class="space-y-8">
    <h1 class="font-heading text-3xl font-bold">Generate Video</h1>

    <!-- Mode Tabs -->
    <div class="flex gap-2">
        <button onclick="setMode('quick')" id="tab-quick" class="px-4 py-2 rounded-lg text-sm font-medium bg-accent-orange/10 text-accent-orange border border-accent-orange/30">Quick Clip</button>
        <button onclick="setMode('film')" id="tab-film" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white border border-white/10">Full Film</button>
        <button onclick="setMode('storyboard')" id="tab-storyboard" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-white border border-white/10">Storyboard Only</button>
    </div>

    <!-- Quick Clip Mode -->
    <div id="mode-quick" class="space-y-6">
        <div class="glass rounded-2xl p-6 space-y-4">
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Prompt</label>
                <textarea id="quick-prompt" rows="4" placeholder="Describe your video scene in detail. Include camera movement, lighting, color grade, and subject..."
                    class="w-full px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none resize-none"></textarea>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Model</label>
                    <select id="quick-model" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="wan2.1">Wan2.1 (Best value)</option>
                        <option value="kling">Kling v2 (Best humans)</option>
                        <option value="kling-pro">Kling Pro (Premium)</option>
                        <option value="minimax">MiniMax (Fast)</option>
                        <option value="luma">Luma Dream Machine</option>
                        <option value="hunyuan">Hunyuan (Cinematic)</option>
                        <option value="ltx">LTX-Video (Budget)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Duration</label>
                    <select id="quick-duration" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="3">3 seconds</option>
                        <option value="5" selected>5 seconds</option>
                        <option value="8">8 seconds</option>
                        <option value="10">10 seconds</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Aspect Ratio</label>
                    <select id="quick-aspect" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="9:16">9:16 (Reel/TikTok)</option>
                        <option value="16:9">16:9 (YouTube)</option>
                        <option value="1:1">1:1 (Square)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Provider</label>
                    <select id="quick-provider" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="fal">fal.ai</option>
                        <option value="replicate">Replicate</option>
                    </select>
                </div>
            </div>

            <button onclick="generateQuick()" id="btn-quick" class="w-full py-3 bg-gradient-to-r from-accent-orange to-accent-red rounded-lg font-heading font-bold text-lg hover:opacity-90 transition">
                Generate Clip
            </button>
        </div>

        <!-- Preset Prompts -->
        <div>
            <h3 class="text-sm text-gray-400 mb-3">Quick Presets (click to use)</h3>
            <div class="flex flex-wrap gap-2">
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Cinematic slow-motion shot of a runner's silhouette against vibrant orange dawn sky, anamorphic lens flare, film grain, dramatic rim lighting, 9:16 portrait">Runner at dawn</button>
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Smooth tracking shot following a group of 5 runners in formation through urban streets at sunrise, orange and teal color grading, wet pavement reflections, cinematic slow motion">Group running</button>
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Extreme close-up slow motion of running shoes hitting wet pavement, water droplets splashing, orange streetlight reflections on ground, dark moody lighting, shallow depth of field">Feet hitting ground</button>
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Elegant product shot of a smartphone floating in dark space with subtle orange neon glow, app interface visible, particles rising, luxury tech aesthetic, 4K">App product shot</button>
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Aerial drone shot flying over a city at golden hour, warm sunlight hitting skyscrapers, smooth cinematic movement, film grain, orange and teal color grade">City aerial</button>
                <button onclick="usePreset(this)" class="text-xs px-3 py-1.5 glass rounded-full hover:border-accent-orange/30" data-prompt="Person celebrating achievement with fist pump, confetti falling, dramatic backlight, slow motion, golden hour lighting, cinematic shallow depth of field">Celebration moment</button>
            </div>
        </div>
    </div>

    <!-- Full Film Mode -->
    <div id="mode-film" class="space-y-6 hidden">
        <div class="glass rounded-2xl p-6 space-y-4">
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Video Concept</label>
                <textarea id="film-concept" rows="4" placeholder="Describe the full video you want. E.g., 'A 30-second cinematic trailer for a running app showing a solo runner transforming into part of a community, ending with the app reveal...'"
                    class="w-full px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none resize-none"></textarea>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Style</label>
                    <select id="film-style" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="cinematic">Cinematic (Film look)</option>
                        <option value="hype">Hype (Fast cuts, energy)</option>
                        <option value="documentary">Documentary (Natural)</option>
                        <option value="luxury">Luxury (Slow, elegant)</option>
                        <option value="social-viral">Social Viral (Bright, energetic)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Target Duration</label>
                    <select id="film-duration" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="15">15 seconds (Story)</option>
                        <option value="30" selected>30 seconds (Reel)</option>
                        <option value="45">45 seconds (Extended)</option>
                        <option value="60">60 seconds (Full)</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Aspect Ratio</label>
                    <select id="film-aspect" class="w-full px-3 py-2 bg-dark-800 border border-white/10 rounded-lg text-sm">
                        <option value="9:16">9:16 (Reel/TikTok)</option>
                        <option value="16:9">16:9 (YouTube)</option>
                    </select>
                </div>
            </div>

            <button onclick="generateFilm()" id="btn-film" class="w-full py-3 bg-gradient-to-r from-accent-blue to-accent-orange rounded-lg font-heading font-bold text-lg hover:opacity-90 transition">
                Create Full Film
            </button>
        </div>
    </div>

    <!-- Storyboard Only Mode -->
    <div id="mode-storyboard" class="space-y-6 hidden">
        <div class="glass rounded-2xl p-6 space-y-4">
            <div>
                <label class="text-xs text-gray-400 uppercase tracking-wider block mb-2">Concept</label>
                <textarea id="sb-concept" rows="3" placeholder="Describe what you want..."
                    class="w-full px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none resize-none"></textarea>
            </div>
            <button onclick="generateStoryboard()" class="w-full py-3 bg-gradient-to-r from-accent-green to-accent-blue rounded-lg font-heading font-bold text-lg hover:opacity-90 transition">
                Generate Storyboard
            </button>
        </div>
    </div>

    <!-- Results Area -->
    <div id="results" class="hidden">
        <h2 class="font-heading font-bold text-xl mb-4">Result</h2>
        <div id="results-content" class="glass rounded-2xl p-6"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function setMode(mode) {
    document.querySelectorAll('[id^="mode-"]').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('[id^="tab-"]').forEach(el => {
        el.classList.remove('bg-accent-orange/10', 'text-accent-orange', 'border-accent-orange/30');
        el.classList.add('text-gray-400', 'border-white/10');
    });
    document.getElementById(`mode-${mode}`).classList.remove('hidden');
    const tab = document.getElementById(`tab-${mode}`);
    tab.classList.add('bg-accent-orange/10', 'text-accent-orange', 'border-accent-orange/30');
    tab.classList.remove('text-gray-400', 'border-white/10');
}

function usePreset(btn) {
    document.getElementById('quick-prompt').value = btn.dataset.prompt;
}

async function generateQuick() {
    const btn = document.getElementById('btn-quick');
    btn.innerHTML = '<div class="spinner mx-auto"></div>';
    btn.disabled = true;

    const data = {
        prompt: document.getElementById('quick-prompt').value,
        model: document.getElementById('quick-model').value,
        duration: parseInt(document.getElementById('quick-duration').value),
        aspect_ratio: document.getElementById('quick-aspect').value,
        provider: document.getElementById('quick-provider').value,
    };

    try {
        const res = await fetch('/api/generate/quick', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        const result = await res.json();
        showResult(result);
    } catch (e) {
        showResult({error: e.message});
    }

    btn.innerHTML = 'Generate Clip';
    btn.disabled = false;
}

async function generateFilm() {
    const btn = document.getElementById('btn-film');
    btn.innerHTML = '<div class="spinner mx-auto"></div>';
    btn.disabled = true;

    const data = {
        concept: document.getElementById('film-concept').value,
        style: document.getElementById('film-style').value,
        duration: parseInt(document.getElementById('film-duration').value),
        aspect_ratio: document.getElementById('film-aspect').value,
        provider: 'fal',
    };

    try {
        const res = await fetch('/api/generate/film', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data),
        });
        const result = await res.json();
        showResult(result);

        if (result.project_id) {
            pollStatus(result.project_id);
        }
    } catch (e) {
        showResult({error: e.message});
    }

    btn.innerHTML = 'Create Full Film';
    btn.disabled = false;
}

async function generateStoryboard() {
    const concept = document.getElementById('sb-concept').value;
    const res = await fetch('/api/generate/storyboard', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ concept, style: 'cinematic', duration: 30 }),
    });
    const result = await res.json();
    showResult(result);
}

async function pollStatus(jobId) {
    const interval = setInterval(async () => {
        const res = await fetch(`/api/status/${jobId}`);
        const status = await res.json();
        if (status.status === 'complete' || status.status === 'error' || status.status === 'assembly_failed') {
            clearInterval(interval);
            showResult(status);
        } else {
            updateProgress(status);
        }
    }, 3000);
}

function updateProgress(status) {
    const el = document.getElementById('results-content');
    el.innerHTML = `
        <div class="flex items-center gap-3">
            <div class="spinner"></div>
            <span class="text-sm text-gray-300">${status.status} — ${status.clips_generated || 0}/${status.clips_total || '?'} clips</span>
        </div>
    `;
    document.getElementById('results').classList.remove('hidden');
}

function showResult(result) {
    const el = document.getElementById('results-content');
    document.getElementById('results').classList.remove('hidden');

    if (result.error) {
        el.innerHTML = `<div class="text-accent-red text-sm">${result.error}</div>`;
    } else if (result.url) {
        el.innerHTML = `
            <video src="${result.url}" controls class="w-full rounded-lg max-h-[500px]"></video>
            <div class="mt-3 flex gap-2">
                <a href="${result.url}" download class="px-4 py-2 bg-accent-green/10 text-accent-green rounded-lg text-sm">Download</a>
                <a href="/publish" class="px-4 py-2 bg-accent-orange/10 text-accent-orange rounded-lg text-sm">Publish</a>
            </div>
        `;
    } else if (result.storyboard || result.shots) {
        const sb = result.storyboard || result;
        el.innerHTML = `
            <h3 class="font-bold mb-3">${sb.title || 'Storyboard'}</h3>
            <div class="space-y-3">
                ${(sb.shots || []).map(s => `
                    <div class="glass rounded-lg p-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-mono text-xs text-accent-orange">Shot ${s.id}</span>
                            <span class="text-xs text-gray-500">${s.duration}s</span>
                        </div>
                        <p class="text-sm text-gray-300">${s.description}</p>
                        <p class="text-xs text-gray-500 mt-1 font-mono">${s.generation_prompt?.substring(0, 120)}...</p>
                    </div>
                `).join('')}
            </div>
        `;
    } else {
        el.innerHTML = `<pre class="text-xs text-gray-400 overflow-auto">${JSON.stringify(result, null, 2)}</pre>`;
    }
}

// Check for hash navigation
if (window.location.hash === '#film') setMode('film');
</script>
{% endblock %}
