<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kendu Studio{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0A0A0F', 800: '#12121A', 700: '#1A1A2E' },
                        accent: { orange: '#FF4D00', red: '#FF1744', ember: '#FF6B35', green: '#39FF14', blue: '#00D4FF', gold: '#FFD700' }
                    },
                    fontFamily: {
                        heading: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0A0A0F; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(12px); }
        .glow-orange { box-shadow: 0 0 20px rgba(255,77,0,0.15); }
        .glow-green { box-shadow: 0 0 20px rgba(57,255,20,0.15); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .nav-link.active { color: #FF4D00; border-bottom: 2px solid #FF4D00; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #FF4D00; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-orange to-accent-red flex items-center justify-center text-xs font-bold">K</div>
                <span class="font-heading font-bold text-lg">Kendu Studio</span>
            </a>
            <div class="flex gap-6">
                <a href="/" class="nav-link text-sm text-gray-400 hover:text-white transition pb-1 {% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/generate" class="nav-link text-sm text-gray-400 hover:text-white transition pb-1 {% if request.path == '/generate' %}active{% endif %}">Generate</a>
                <a href="/library" class="nav-link text-sm text-gray-400 hover:text-white transition pb-1 {% if request.path == '/library' %}active{% endif %}">Library</a>
                <a href="/publish" class="nav-link text-sm text-gray-400 hover:text-white transition pb-1 {% if request.path == '/publish' %}active{% endif %}">Publish</a>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-500 font-mono" id="api-status"></span>
                <button onclick="openSettings()" class="text-gray-400 hover:text-white text-sm">Settings</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 pb-12 px-6 max-w-7xl mx-auto">
        {% block content %}{% endblock %}
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/70" onclick="closeSettings()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[480px] glass border-l border-white/10 p-8 overflow-y-auto">
            <h2 class="font-heading font-bold text-xl mb-6">API Configuration</h2>
            <form id="settings-form" class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider">fal.ai Key</label>
                    <input type="password" name="fal_key" placeholder="Get from fal.ai/dashboard" class="w-full mt-1 px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider">Replicate Token</label>
                    <input type="password" name="replicate_api_token" placeholder="Get from replicate.com/account" class="w-full mt-1 px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider">Anthropic API Key (for smart storyboards)</label>
                    <input type="password" name="anthropic_api_key" placeholder="Get from console.anthropic.com" class="w-full mt-1 px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none">
                </div>
                <hr class="border-white/5 my-6">
                <h3 class="text-sm font-medium text-gray-300">Social Media (optional)</h3>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider">Instagram Token</label>
                    <input type="password" name="instagram_token" class="w-full mt-1 px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none">
                </div>
                <div>
                    <label class="text-xs text-gray-400 uppercase tracking-wider">Twitter/X API Key</label>
                    <input type="password" name="twitter_api_key" class="w-full mt-1 px-4 py-3 bg-dark-800 border border-white/10 rounded-lg text-sm focus:border-accent-orange outline-none">
                </div>
                <button type="submit" class="w-full mt-6 py-3 bg-accent-orange rounded-lg font-medium hover:bg-accent-ember transition">Save Configuration</button>
            </form>
        </div>
    </div>

    <script>
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        document.getElementById('settings-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = new FormData(e.target);
            const data = Object.fromEntries(form.entries());
            await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            closeSettings();
            checkApiStatus();
        });

        async function checkApiStatus() {
            const res = await fetch('/api/config');
            const config = await res.json();
            const connected = Object.values(config).filter(v => v === true).length;
            document.getElementById('api-status').textContent = `${connected} API${connected !== 1 ? 's' : ''} connected`;
        }
        checkApiStatus();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
