name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # The backend runs on Postgres, so the integration tests need a real
    # database. Spin one up as a service container for the job.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sprint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm install --include=dev

      - name: Install client dependencies
        working-directory: client
        run: npm install --include=dev

      - name: Typecheck server
        working-directory: server
        run: npx tsc --noEmit

      - name: Typecheck client
        working-directory: client
        run: npx tsc -b --noEmit

      - name: Test server
        working-directory: server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sprint_test
          PGSSL: 'false'
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: npm test

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client
        working-directory: client
        run: npm run build
