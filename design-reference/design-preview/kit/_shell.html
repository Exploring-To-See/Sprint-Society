<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>__TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../kit/ss-base.css">
<style>
  /* Standalone-render helpers ONLY (layout/positioning). NO new colors, radii, shadows,
     or type — those come from ss-base tokens. This block must never introduce a look. */
  html,body{margin:0;background:var(--bg)}
  .ss-screen{min-height:100dvh}
  .ss-aura{position:absolute}
  /* the floating nav is fixed in the app; pin it to the screen column for the still */
  .f2-nav{position:absolute}
  /* the glide-pill sits behind whichever icon is active — center it inside the active tab
     so it is always correct regardless of tab index */
  .f2-it > .f2-pill{top:50%;left:50%;margin-left:0;transform:translate(-50%,-50%)}
  /* PAGE-SPECIFIC LAYOUT CSS GOES HERE (grid/padding/heights only) */
  /* __PAGE_STYLE__ */
</style>
</head>
<body>
  <div class="ss-screen">
    <div class="ss-aura" aria-hidden="true"></div>
    <div class="aurora" aria-hidden="true">
      <div class="mesh"></div><div class="sweep"></div><div class="ray"></div><div class="vignette"></div><div class="grain"></div>
    </div>
    <div class="veil" aria-hidden="true"></div>

    <div class="status" aria-hidden="true"><span>9:41</span><span>▮▮ 30</span></div>

    <header class="topbar">
      <div class="brand"><b>Sprint</b> Society</div>
      <div class="icons">
        <button class="iconbtn" aria-label="Notifications, 3 unread"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9A9CB0" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="badge" aria-hidden="true">3</span></button>
        <button class="avatar" aria-label="Your profile, Ishan">IV</button>
      </div>
    </header>

    <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
      <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F97316"/><stop offset=".55" stop-color="#FB923C"/><stop offset="1" stop-color="#FBBF24"/></linearGradient>
    </defs></svg>

    <main class="body" aria-label="__BODY_LABEL__">
      <!-- __PAGE_CONTENT__ -->
    </main>

         <span class="f2-pill"> INTO that active button (so it renders behind the lit icon). -->

      <div class="f2-cap">
        <div class="f2-row">
