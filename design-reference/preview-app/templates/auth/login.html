{% extends 'base_auth.html' %}
{% block auth %}
<div class="pad" style="max-width:360px;margin:0 auto;padding-top:8vh">
  <div style="text-align:center;margin-bottom:26px">
    <div class="brand" style="font-size:26px">{% raw %}{% endraw %}<b>Sprint</b> Society</div>
    <p style="color:var(--muted);font:500 12.5px var(--body);margin-top:6px">Your AI-powered run club</p>
  </div>

  <form method="post" class="tile" style="gap:12px">
    <div>
      <label class="tlbl" style="display:block;margin-bottom:6px">Email</label>
      <input class="ss-input" type="email" name="email" placeholder="you@example.com" value="ishan@sprintsociety.in" autocomplete="email" required>
    </div>
    <div style="margin-top:12px">
      <label class="tlbl" style="display:block;margin-bottom:6px">Password</label>
      <input class="ss-input" type="password" name="password" placeholder="••••••••" value="runfast" autocomplete="current-password" required>
    </div>
    <button class="ss-btn ss-btn-primary" type="submit" style="width:100%;margin-top:16px">Sign in</button>
  </form>

  <p style="text-align:center;color:var(--muted);font:500 12px var(--body);margin-top:18px">
    New here? <a href="{{ url_for('register') }}" style="color:var(--violet-2);font-weight:600">Create an account</a>
  </p>
  <p style="text-align:center;color:var(--muted-2);font:500 11px var(--body);margin-top:10px">
    Demo login is pre-filled — just tap Sign in.
  </p>
</div>
{% endblock %}
