# Local Postgres for Sprint Society dev + tests.
# Usage:
#   docker compose up -d        # start Postgres on localhost:5432
#   docker compose down         # stop (keeps data)
#   docker compose down -v      # stop + wipe data
# Then set DATABASE_URL (see .env.example) and run: npm run dev
services:
  postgres:
    image: postgres:16-alpine
    container_name: sprint-society-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprint
      POSTGRES_PASSWORD: sprint
      POSTGRES_DB: sprint_society
    ports:
      - "5432:5432"
    volumes:
      - sprint_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprint -d sprint_society"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sprint_pgdata:
